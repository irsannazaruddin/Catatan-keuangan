<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Pro</title>
    
    <meta name="theme-color" content="#4361ee">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    
    <link id="manifest-link" rel="manifest">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #4361ee; --success: #2ec4b6; --danger: #e71d36; --dark: #1e1e2d; --wa: #25D366; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f2f5; margin: 0; color: var(--dark); }
        .navbar { background: var(--primary); padding: 20px; color: white; text-align: center; font-weight: 700; font-size: 1.2rem; }
        .container { max-width: 500px; margin: -30px auto 50px auto; padding: 0 15px; }
        
        .main-card { background: linear-gradient(135deg, #4361ee, #7209b7); border-radius: 20px; padding: 25px; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.15); margin-bottom: 25px; }
        .main-card p { margin: 0; opacity: 0.8; font-size: 0.8rem; }
        .main-card h2 { margin: 5px 0 20px 0; font-size: 1.8rem; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { background: rgba(255, 255, 255, 0.15); padding: 12px; border-radius: 12px; backdrop-filter: blur(5px); }
        .stat-item b { font-size: 0.9rem; }

        .input-section, .history-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1.5px solid #eee; border-radius: 10px; font-family: inherit; box-sizing: border-box; font-size: 0.9rem; }

        .btn-add { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-bottom: 5px; }
        .btn-install { width: 100%; padding: 12px; background: #1e1e2d; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; display: none; align-items: center; justify-content: center; gap: 8px; }
        .btn-wa { width: 100%; padding: 12px; background: var(--wa); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 0.85rem; }
        
        .transaction-item { background: #fcfcfc; padding: 12px; border-radius: 12px; display: flex; align-items: center; margin-bottom: 10px; border: 1px solid #f0f0f0; }
        .icon-box { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 0.8rem; }
        .info { flex-grow: 1; }
        .title { font-weight: 600; display: block; font-size: 0.9rem; }
        .date-label { font-size: 0.7rem; color: #999; }
        .amount { font-weight: 700; font-size: 0.9rem; }
        .plus { color: var(--success); }
        .minus { color: var(--danger); }
        .btn-del { background: none; border: none; color: #ddd; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

<div class="navbar"><i class="fas fa-wallet"></i> MyFinance Pro</div>

<div class="container">
    <div class="main-card">
        <p>Total Saldo</p>
        <h2 id="totalBalance">Rp 0</h2>
        <div class="stats-grid">
            <div class="stat-item"><p>Masuk</p><b id="totalIncome">Rp 0</b></div>
            <div class="stat-item"><p>Keluar</p><b id="totalExpense">Rp 0</b></div>
        </div>
        <button class="btn-wa" onclick="sendToWhatsApp()">
            <i class="fab fa-whatsapp"></i> Kirim Laporan ke WA
        </button>
        <button id="installBtn" class="btn-install">
            <i class="fas fa-download"></i> Tampilkan di Layar Utama
        </button>
    </div>

    <div class="input-section">
        <div class="form-group">
            <label>Tanggal</label>
            <input type="date" id="dateInput">
        </div>
        <div class="form-group">
            <label>Keterangan</label>
            <input type="text" id="desc" placeholder="Makan siang, Gaji, dll">
        </div>
        <div class="form-group">
            <label>Nominal (Rp)</label>
            <input type="number" id="amount" placeholder="0">
        </div>
        <div class="form-group">
            <label>Jenis</label>
            <select id="type">
                <option value="income">Pemasukan (+)</option>
                <option value="expense" selected>Pengeluaran (-)</option>
            </select>
        </div>
        <button class="btn-add" onclick="addTransaction()">Simpan Transaksi</button>
    </div>

    <div class="history-section">
        <h3 style="margin-top:0; font-size:0.9rem;">Riwayat Transaksi</h3>
        <div id="transactionList"></div>
    </div>
</div>

<script>
    // --- LOGIKA KEUANGAN ---
    let transactions = JSON.parse(localStorage.getItem('dated_finance_v1')) || [];
    document.getElementById('dateInput').valueAsDate = new Date();

    function updateUI() {
        const list = document.getElementById('transactionList');
        let income = 0, expense = 0;
        list.innerHTML = '';
        const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

        sorted.forEach((t) => {
            const isInc = t.type === 'income';
            isInc ? income += t.amount : expense += t.amount;
            const d = new Date(t.date);
            const formattedDate = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;

            const item = document.createElement('div');
            item.className = 'transaction-item';
            item.innerHTML = `
                <div class="icon-box" style="background:${isInc ? '#e6f7f5':'#fce8ea'}; color:${isInc ? '#2ec4b6':'#e71d36'}">
                    <i class="fas ${isInc ? 'fa-arrow-up':'fa-arrow-down'}"></i>
                </div>
                <div class="info">
                    <span class="title">${t.desc}</span>
                    <span class="date-label">${formattedDate}</span>
                </div>
                <div class="amount ${isInc?'plus':'minus'}">${isInc?'+':'-'} ${t.amount.toLocaleString()}</div>
                <button class="btn-del" onclick="removeTransaction('${t.id}')"><i class="fas fa-trash"></i></button>
            `;
            list.appendChild(item);
        });

        document.getElementById('totalBalance').innerText = `Rp ${(income - expense).toLocaleString()}`;
        document.getElementById('totalIncome').innerText = `Rp ${income.toLocaleString()}`;
        document.getElementById('totalExpense').innerText = `Rp ${expense.toLocaleString()}`;
        localStorage.setItem('dated_finance_v1', JSON.stringify(transactions));
    }

    function addTransaction() {
        const date = document.getElementById('dateInput').value;
        const desc = document.getElementById('desc').value;
        const amount = parseInt(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        if (!date || !desc || !amount) return alert('Lengkapi datanya dulu ya!');
        transactions.push({ id: Date.now().toString(), date, desc, amount, type });
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        updateUI();
    }

    function removeTransaction(id) {
        if(confirm('Hapus transaksi ini?')) {
            transactions = transactions.filter(t => t.id !== id);
            updateUI();
        }
    }

    function sendToWhatsApp() {
        if (transactions.length === 0) return alert('Belum ada data.');
        let income = 0, expense = 0, detailText = "";
        const sorted = [...transactions].sort((a, b) => new Date(a.date) - new Date(b.date));
        sorted.forEach(t => {
            const sign = t.type === 'income' ? '🟢' : '🔴';
            if (t.type === 'income') income += t.amount; else expense += t.amount;
            detailText += `${t.date} | ${sign} ${t.desc}: Rp ${t.amount.toLocaleString()}\n`;
        });
        const message = `*LAPORAN KEUANGAN SAYA*\n--------------------------\n💰 *Saldo:* Rp ${(income-expense).toLocaleString()}\n📥 Masuk: Rp ${income.toLocaleString()}\n📤 Keluar: Rp ${expense.toLocaleString()}\n--------------------------\n*Rincian:*\n${detailText}\n_Dibuat via MyFinance Web_`;
        window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    }

    updateUI();

    // --- LOGIKA PWA (INSTALASI) ---
    
    // 1. Membuat Manifest secara dinamis
    const myManifest = {
        "name": "MyFinance Pro",
        "short_name": "MyFinance",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#4361ee",
        "theme_color": "#4361ee",
        "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/2489/2489756.png", "sizes": "512x512", "type": "image/png" }]
    };
    const manifestStr = JSON.stringify(myManifest);
    const manifestBlob = new Blob([manifestStr], {type: 'application/json'});
    document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));

    // 2. Registrasi Service Worker Virtual
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', (e) => self.skipWaiting());
            self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
        `;
        const swBlob = new Blob([swCode], {type: 'text/javascript'});
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl);
    }

    // 3. Menangani Tombol Install
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex'; // Munculkan tombol jika didukung browser
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBtn.style.display = 'none';
            deferredPrompt = null;
        }
    });
</script>
</body>
</html>
